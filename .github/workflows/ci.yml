name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate localization files
        run: |
          plutil -lint \
            StarMagpie/en.lproj/Localizable.strings \
            StarMagpie/zh-Hans.lproj/Localizable.strings \
            StarMagpie/en.lproj/InfoPlist.strings \
            StarMagpie/zh-Hans.lproj/InfoPlist.strings

      - name: Run tests
        run: xcodebuild test -scheme StarMagpie -destination 'platform=macOS'


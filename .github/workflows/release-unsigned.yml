name: Release Unsigned Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Unsigned macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Build unsigned package
        run: ./scripts/package-unsigned.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarMagpie-unsigned
          path: |
            dist/StarMagpie-unsigned.dmg
            dist/StarMagpie-unsigned.dmg.sha256
            dist/StarMagpie-unsigned.zip
            dist/StarMagpie-unsigned.zip.sha256

      - name: Attach package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/StarMagpie-unsigned.dmg
            dist/StarMagpie-unsigned.dmg.sha256
            dist/StarMagpie-unsigned.zip
            dist/StarMagpie-unsigned.zip.sha256
          body: |
            This release contains unsigned macOS packages without Developer ID signing or Apple notarization because the project does not use an Apple Developer certificate yet.

            Recommended download:
            - StarMagpie-unsigned.dmg

            Xcode may still add an ad-hoc/linker signature to the executable. This is not a Developer ID signature, and macOS Gatekeeper will warn that the app is from an unidentified developer. You can also build from source with Xcode.

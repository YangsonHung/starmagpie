name: Bug report
description: Report a reproducible problem in StarMagpie.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove any GitHub token or sensitive information before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open StarMagpie
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.0"
    validations:
      required: true
  - type: input
    id: xcode
    attributes:
      label: Xcode version
      placeholder: "Xcode 26.0"
  - type: input
    id: app-version
    attributes:
      label: StarMagpie version or commit
      placeholder: "0.1.0 or commit hash"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove tokens, API keys, and private repository data before attaching.

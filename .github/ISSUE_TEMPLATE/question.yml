name: Question
description: Ask a question about usage, setup, or development.
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: What do you want to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include macOS version, Xcode version, and relevant steps if useful.
